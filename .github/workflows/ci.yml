name: CI/CD Pipeline - MLOps Assignment

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger
    inputs:
      train_model:
        description: 'Run model training'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.9'
  CACHE_KEY: pip-${{ hashFiles('**/requirements.txt') }}

jobs:
  # Job 1: Code Quality - Linting
  lint:
    name: Code Linting
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint black isort

    - name: Run flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 Part1/src Part2/src --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 Part1/src Part2/src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics > flake8-report.txt
      continue-on-error: true

    - name: Run pylint
      run: |
        pylint Part1/src Part2/src --exit-zero --output-format=text > pylint-report.txt || true
      continue-on-error: true

    - name: Check code formatting with black
      run: |
        black --check Part1/src Part2/src --diff > black-report.txt || true
      continue-on-error: true

    - name: Check import sorting with isort
      run: |
        isort --check-only Part1/src Part2/src --diff > isort-report.txt || true
      continue-on-error: true

    - name: Upload linting reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: linting-reports
        path: |
          flake8-report.txt
          pylint-report.txt
          black-report.txt
          isort-report.txt
        retention-days: 30

  # Job 2: Unit Testing
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ env.CACHE_KEY }}
        restore-keys: |
          pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-html pytest-json-report

    - name: Run unit tests with coverage
      run: |
        pytest Part3/tests/ \
          -v \
          --cov=Part2/src \
          --cov=Part1/src \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term \
          --html=test-report.html \
          --self-contained-html \
          --json-report \
          --json-report-file=test-report.json

    - name: Generate test summary
      if: always()
      run: |
        echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f test-report.json ]; then
          python -c "
        import json
        with open('test-report.json') as f:
            data = json.load(f)
            summary = data.get('summary', {})
            print(f\"- **Total Tests**: {summary.get('total', 0)}\")
            print(f\"- **Passed**: {summary.get('passed', 0)} ✅\")
            print(f\"- **Failed**: {summary.get('failed', 0)} ❌\")
            print(f\"- **Duration**: {summary.get('duration', 0):.2f}s\")
        " >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: |
          test-report.html
          test-report.json
          htmlcov/
        retention-days: 30

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Coverage comment
      uses: py-cov-action/python-coverage-comment-action@v3
      if: github.event_name == 'pull_request'
      with:
        GITHUB_TOKEN: ${{ github.token }}
      continue-on-error: true

  # Job 3: Model Training (optional, runs on workflow_dispatch or main branch)
  train:
    name: Model Training
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [lint, test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        lfs: true  # Enable Git LFS for large files

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download training data (DVC)
      run: |
        # If using DVC, pull data here
        # dvc pull
        echo "Data download step - configure DVC if needed"
      continue-on-error: true

    - name: Run data preprocessing
      run: |
        cd Part1
        python src/data_preprocessing.py 2>&1 | tee preprocessing.log
      continue-on-error: true

    - name: Run model training
      if: github.event.inputs.train_model == 'true' || github.event_name == 'push'
      run: |
        cd Part1
        python src/train_model.py 2>&1 | tee training.log
      continue-on-error: true

    - name: Generate training summary
      if: always()
      run: |
        echo "## Model Training Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

    - name: Upload training artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: training-artifacts
        path: |
          Part1/models/
          Part1/mlruns/
          Part1/*.log
          Part1/data/processed/
        retention-days: 30

    - name: Upload model as artifact
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: trained-model
        path: Part1/models/model.pt
        retention-days: 90

  # Job 4: Docker Build & Push
  build:
    name: Build & Push Docker Image
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      continue-on-error: true

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/cats-dogs-api
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Part2/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cats-dogs-api:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cats-dogs-api:buildcache,mode=max
        build-args: |
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          VCS_REF=${{ github.sha }}

    - name: Generate Docker build summary
      if: always()
      run: |
        echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Image Tags**: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Date**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

    - name: Upload Docker build logs
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: docker-build-logs
        path: |
          /tmp/docker-build-*.log
        retention-days: 7
        if-no-files-found: ignore

  # Job 5: Workflow Summary
  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()

    steps:
    - name: Generate final summary
      run: |
        echo "# CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Workflow Details" >> $GITHUB_STEP_SUMMARY
        echo "- **Workflow**: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Run Number**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Job Status" >> $GITHUB_STEP_SUMMARY
        echo "- Linting: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Testing: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Docker Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
